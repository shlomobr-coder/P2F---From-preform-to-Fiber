<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> P2F - from preform to fiber </title>
    
    <!-- Tailwind CSS for modern premium styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Google Fonts for premium typography -->
    <link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
    <!-- Lucide Icons for high fidelity iconography -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Assistant', sans-serif;
            background-color: #f8fafc;
        }
        /* Custom scrollbar style for elegant horizontal layout */
        .custom-scrollbar::-webkit-scrollbar {
            height: 6px;
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: #f1f5f9;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 4px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
        /* Smooth scale up on hover for interactive elements */
        .card-hover {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .card-hover:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        }
    </style>
</head>
<body class="h-screen overflow-hidden flex flex-col">

    <div id="root" class="h-full flex flex-col"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // ==========================================
        // !!! הגדרות FIREBASE !!!
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyAIc196pc3u5hiDnbOeDwbjMCyBJ9S_Hr4",
            authDomain: "p2f---from-preform-to-fiber.firebaseapp.com",
            databaseURL: "https://p2f---from-preform-to-fiber-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "p2f---from-preform-to-fiber",
            storageBucket: "p2f---from-preform-to-fiber.firebasestorage.app",
            messagingSenderId: "358737766120",
            appId: "1:358737766120:web:b08673220e1e5c4f720b5d"
        };

        const isFirebaseConfigured = firebaseConfig.apiKey !== "YOUR_API_KEY";

        // ==========================================
        // 10 התחנות המדויקות שלך לפי הסדר עם צבעים ייחודיים
        // ==========================================
        const STATIONS = [
            { id: "future_cops", name: "גלמים עתידיים", color: "bg-gray-500", border: "border-gray-500", text: "text-gray-700", lightBg: "bg-gray-50" },
            { id: "mcvd", name: "MCVD", color: "bg-teal-600", border: "border-teal-600", text: "text-teal-700", lightBg: "bg-teal-50" },
            { id: "fluorescence", name: "Fluorescence", color: "bg-purple-600", border: "border-purple-600", text: "text-purple-700", lightBg: "bg-purple-50" },
            { id: "gwl", name: "GWL", color: "bg-orange-600", border: "border-orange-600", text: "text-orange-700", lightBg: "bg-orange-50" },
            { id: "vsl", name: "VSL", color: "bg-pink-600", border: "border-pink-600", text: "text-pink-700", lightBg: "bg-pink-50" },
            { id: "petrus", name: "Petrus", color: "bg-green-600", border: "border-green-600", text: "text-green-700", lightBg: "bg-green-50" },
            { id: "lusielight", name: "Lusielight", color: "bg-indigo-600", border: "border-indigo-600", text: "text-indigo-700", lightBg: "bg-indigo-50" },
            { id: "tower", name: "Tower", color: "bg-amber-500", border: "border-amber-500", text: "text-amber-700", lightBg: "bg-amber-50" },
            { id: "tm", name: "T&M", color: "bg-blue-600", border: "border-blue-600", text: "text-blue-700", lightBg: "bg-blue-50" },
            { id: "M&O", name: "Maintenance & Orders", color: "bg-yellow-600", border: "border-yellow-600", text: "text-yellow-700", lightBg: "bg-yellow-50" }
        ];

        // Default offline/demo state
        const INITIAL_OFFLINE_FIBERS = {
            "demo-1": { 
                id: "demo-1", 
                name: "סיב אופטי חד-מצב #101", 
                stationId: "future_cops", 
                comments: "לבדיקת איכות", 
                timestamp: Date.now(), 
                order: 1,
                saveToHistory: true,
                archived: false,
                stationData: {
                    future_cops: [
                        { operator: "משה", timestamp: Date.now() - 7200000, text: "התקבל חומר גלם ראשוני נקי ותקין." }
                    ],
                    mcvd: [
                        { operator: "יוסי", timestamp: Date.now() - 3600000, text: "בוצעה מתיחה מוצלחת ב-220 מעלות, קוטר אחיד." }
                    ]
                },
                historyLog: [
                    { stationId: "future_cops", timestamp: Date.now() - 7200000, note: "נוצר והוצב בלוח" },
                    { stationId: "mcvd", timestamp: Date.now() - 3600000, note: "הועבר לתחנת MCVD" }
                ]
            },
            "demo-2": { 
                id: "demo-2", 
                name: "גולם סיליקה MCVD #44", 
                stationId: "mcvd", 
                comments: "להריץ בלילה", 
                timestamp: Date.now() - 3600000, 
                order: 2,
                saveToHistory: false,
                archived: false,
                stationData: {},
                historyLog: [
                    { stationId: "future_cops", timestamp: Date.now() - 3600000, note: "נוצר והוצב בלוח" }
                ]
            }
        };

        const INITIAL_OFFLINE_STATION_NOTES = {
            "future_cops": "נא לרשום תאריך הגעה לכל גלם חדש",
        };

        function App() {
            const [fibers, setFibers] = useState(INITIAL_OFFLINE_FIBERS);
            const [stationNotes, setStationNotes] = useState(INITIAL_OFFLINE_STATION_NOTES);
            const [newFiberName, setNewFiberName] = useState("");
            const [newFiberStation, setNewFiberStation] = useState("future_cops");
            const [newFiberSaveToHistory, setNewFiberSaveToHistory] = useState(true);
            const [editingStationNotes, setEditingStationNotes] = useState(null);
            const [tempStationNoteText, setTempStationNoteText] = useState("");
            const [activeTab, setActiveTab] = useState("board"); // "board", "list", "history"
            const [draggedFiberId, setDraggedFiberId] = useState(null);
            const [isLive, setIsLive] = useState(false);
            const [activeMenuFiberId, setActiveMenuFiberId] = useState(null); 
            
            // Detail modal states
            const [selectedFiberId, setSelectedFiberId] = useState(null);
            const [modalActiveStation, setModalActiveStation] = useState("future_cops");
            const [searchHistoryQuery, setSearchHistoryQuery] = useState("");
            
            // Operator custom inputs inside modal
            const [tempOperatorName, setTempOperatorName] = useState("");
            const [tempModalNoteText, setTempModalNoteText] = useState("");

            useEffect(() => {
                // Pre-fill operator name from storage for ease of use
                const savedOperator = localStorage.getItem('last_operator');
                if (savedOperator) setTempOperatorName(savedOperator);
            }, [selectedFiberId]);

            useEffect(() => {
                if (!isFirebaseConfigured) {
                    console.warn("Firebase config is missing. Operating in local demo mode.");
                    return;
                }

                const runFirebase = async () => {
                    try {
                        const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
                        const { getDatabase, ref, onValue } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");

                        const app = initializeApp(firebaseConfig);
                        const db = getDatabase(app);
                        setIsLive(true);

                        // Listen to active and archived fibers
                        const fibersRef = ref(db, 'fibers');
                        onValue(fibersRef, (snapshot) => {
                            const data = snapshot.val();
                            setFibers(data || {});
                        });

                        // Listen to station guidelines/notes
                        const notesRef = ref(db, 'stationNotes');
                        onValue(notesRef, (snapshot) => {
                            const data = snapshot.val();
                            setStationNotes(data || {});
                        });
                    } catch (error) {
                        console.error("Firebase connection failed: ", error);
                        setIsLive(false);
                    }
                };

                runFirebase();
            }, []);

            const updateDatabase = async (newFibers, newStationNotes = null) => {
                if (newFibers) setFibers(newFibers);
                if (newStationNotes) setStationNotes(newStationNotes);

                if (isLive && isFirebaseConfigured) {
                    const { initializeApp } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js");
                    const { getDatabase, ref, set: dbSet } = await import("https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js");
                    const app = initializeApp(firebaseConfig);
                    const db = getDatabase(app);

                    if (newFibers) {
                        await dbSet(ref(db, 'fibers'), newFibers);
                    }
                    if (newStationNotes) {
                        await dbSet(ref(db, 'stationNotes'), newStationNotes);
                    }
                } else {
                    localStorage.setItem('local_fibers', JSON.stringify(newFibers || fibers));
                    localStorage.setItem('local_notes', JSON.stringify(newStationNotes || stationNotes));
                }
            };

            // Local fallback backup
            useEffect(() => {
                if (!isLive) {
                    const savedFibers = localStorage.getItem('local_fibers');
                    const savedNotes = localStorage.getItem('local_notes');
                    if (savedFibers) setFibers(JSON.parse(savedFibers));
                    if (savedNotes) setStationNotes(JSON.parse(savedNotes));
                }
            }, [isLive]);

            const handleAddFiber = (e) => {
                e.preventDefault();
                if (!newFiberName.trim()) return;

                const newId = "f-" + Date.now();
                const updatedFibers = {
                    ...fibers,
                    [newId]: {
                        id: newId,
                        name: newFiberName.trim(),
                        stationId: newFiberStation,
                        comments: "",
                        timestamp: Date.now(),
                        order: Date.now(),
                        saveToHistory: newFiberSaveToHistory,
                        archived: false,
                        stationData: {},
                        historyLog: [
                            { stationId: newFiberStation, timestamp: Date.now(), note: "נוצר והוצב בלוח" }
                        ]
                    }
                };

                updateDatabase(updatedFibers);
                setNewFiberName("");
            };

            const handleMoveFiber = (fiberId, targetStationId) => {
                if (!fibers[fiberId]) return;
                
                const currentFiber = fibers[fiberId];
                if (currentFiber.stationId === targetStationId) return;

                const targetStationFibers = Object.values(fibers)
                    .filter(f => f.stationId === targetStationId && f.id !== fiberId && !f.archived)
                    .sort((a,b) => (a.order || 0) - (b.order || 0));

                // Append to history log
                const newLogEntry = {
                    stationId: targetStationId,
                    timestamp: Date.now(),
                    note: `הועבר לתחנת ${STATIONS.find(s => s.id === targetStationId)?.name || targetStationId}`
                };
                const updatedHistoryLog = currentFiber.historyLog ? [...currentFiber.historyLog, newLogEntry] : [newLogEntry];

                const updatedFibers = { ...fibers };
                updatedFibers[fiberId] = {
                    ...currentFiber,
                    stationId: targetStationId,
                    historyLog: updatedHistoryLog,
                    order: targetStationFibers.length > 0 ? (targetStationFibers[targetStationFibers.length - 1].order || 0) + 1 : 0
                };

                updateDatabase(updatedFibers);
                setActiveMenuFiberId(null); 
            };

            const handleUpdateComments = (fiberId, newText) => {
                if (!fibers[fiberId]) return;
                const updatedFibers = {
                    ...fibers,
                    [fiberId]: {
                        ...fibers[fiberId],
                        comments: newText
                    }
                };
                updateDatabase(updatedFibers);
            };

            const handleAddStationNoteEntry = (fiberId, stationId) => {
                if (!tempModalNoteText.trim()) return;
                const fiber = fibers[fiberId];
                if (!fiber) return;

                // Load existing logs (handling legacy strings gracefully)
                let existingNotes = [];
                const rawData = fiber.stationData ? fiber.stationData[stationId] : null;
                if (Array.isArray(rawData)) {
                    existingNotes = rawData;
                } else if (typeof rawData === 'string' && rawData.trim() !== '') {
                    existingNotes = [{ operator: "הערה כללית", timestamp: fiber.timestamp, text: rawData }];
                }

                const newEntry = {
                    operator: tempOperatorName.trim() || "מפעיל כללי",
                    timestamp: Date.now(),
                    text: tempModalNoteText.trim()
                };

                const updatedFibers = {
                    ...fibers,
                    [fiberId]: {
                        ...fiber,
                        stationData: {
                            ...(fiber.stationData || {}),
                            [stationId]: [...existingNotes, newEntry]
                        }
                    }
                };

                updateDatabase(updatedFibers);
                setTempModalNoteText("");
                localStorage.setItem('last_operator', tempOperatorName.trim());
            };

            const handleToggleSaveToHistory = (fiberId) => {
                if (!fibers[fiberId]) return;
                const updatedFibers = {
                    ...fibers,
                    [fiberId]: {
                        ...fibers[fiberId],
                        saveToHistory: !fibers[fiberId].saveToHistory
                    }
                };
                updateDatabase(updatedFibers);
            };

            const handleDeleteOrArchiveFiber = (fiberId) => {
                const fiber = fibers[fiberId];
                if (!fiber) return;

                const updatedFibers = { ...fibers };
                if (fiber.saveToHistory) {
                    updatedFibers[fiberId] = {
                        ...fiber,
                        archived: true,
                        archiveTimestamp: Date.now()
                    };
                } else {
                    delete updatedFibers[fiberId];
                }
                updateDatabase(updatedFibers);
                if (selectedFiberId === fiberId) setSelectedFiberId(null);
            };

            const handleMovePriority = (fiberId, direction) => {
                const fiber = fibers[fiberId];
                if (!fiber || fiber.archived) return;

                const stationFibers = Object.values(fibers)
                    .filter(f => f.stationId === fiber.stationId && !f.archived)
                    .sort((a,b) => (a.order || 0) - (b.order || 0));

                const index = stationFibers.findIndex(f => f.id === fiberId);
                if (index === -1) return;

                let targetIndex = index + direction;
                if (targetIndex < 0 || targetIndex >= stationFibers.length) return;

                const temp = stationFibers[index];
                stationFibers[index] = stationFibers[targetIndex];
                stationFibers[targetIndex] = temp;

                const updatedFibers = { ...fibers };
                stationFibers.forEach((f, idx) => {
                    updatedFibers[f.id] = {
                        ...updatedFibers[f.id],
                        order: idx
                    };
                });

                updateDatabase(updatedFibers);
            };

            const handleOpenStationNoteEdit = (stationId) => {
                setEditingStationNotes(stationId);
                setTempStationNoteText(stationNotes[stationId] || "");
            };

            const handleSaveStationNote = (stationId) => {
                const updatedNotes = {
                    ...stationNotes,
                    [stationId]: tempStationNoteText
                };
                updateDatabase(null, updatedNotes);
                setEditingStationNotes(null);
            };

            const handleDragStart = (e, fiberId) => {
                setDraggedFiberId(fiberId);
                e.dataTransfer.setData("text/plain", fiberId);
            };

            const handleDragOver = (e) => {
                e.preventDefault();
            };

            const handleDropOnStation = (e, stationId) => {
                e.preventDefault();
                const fiberId = e.dataTransfer.getData("text/plain") || draggedFiberId;
                if (!fiberId) return;

                handleMoveFiber(fiberId, stationId);
                setDraggedFiberId(null);
            };

            const handleDropOnCard = (e, targetFiberId, stationId) => {
                e.preventDefault();
                e.stopPropagation(); 
                const draggedId = e.dataTransfer.getData("text/plain") || draggedFiberId;
                if (!draggedId || draggedId === targetFiberId) return;

                const draggedFiber = fibers[draggedId];
                if (!draggedFiber) return;

                const targetStationFibers = Object.values(fibers)
                    .filter(f => f.stationId === stationId && f.id !== draggedId && !f.archived)
                    .sort((a,b) => (a.order || 0) - (b.order || 0));

                const destIndex = targetStationFibers.findIndex(f => f.id === targetFiberId);
                if (destIndex !== -1) {
                    targetStationFibers.splice(destIndex, 0, { ...draggedFiber, stationId });
                } else {
                    targetStationFibers.push({ ...draggedFiber, stationId });
                }

                const updatedFibers = { ...fibers };
                targetStationFibers.forEach((f, idx) => {
                    updatedFibers[f.id] = {
                        ...updatedFibers[f.id],
                        stationId: stationId,
                        order: idx
                    };
                });

                updateDatabase(updatedFibers);
                setDraggedFiberId(null);
            };

            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [fibers, stationNotes, editingStationNotes, activeTab, isLive, activeMenuFiberId, selectedFiberId, searchHistoryQuery, tempModalNoteText, tempOperatorName]);

            // Exclude archived and M&O from active tracking counts
            const activeFibers = Object.values(fibers).filter(f => !f.archived);
            
            // All items that should be logged in history (both archived and currently active but tracked)
            const historyFibers = Object.values(fibers).filter(f => f.saveToHistory);
            
            const monitoredFibersCount = activeFibers.filter(f => f.stationId !== "M&O").length;
            const selectedFiber = fibers[selectedFiberId];

            return (
                <div class="h-full flex flex-col overflow-hidden">
                    
                    {}
                    {!isLive && (
                        <div class="bg-amber-500 text-white px-4 py-2 text-sm text-center font-semibold shadow-inner flex items-center justify-center gap-2">
                            <span class="w-2.5 h-2.5 rounded-full bg-white animate-pulse"></span>
                            <span>מצב הדגמה מקומי (מצב לא מקוון). האתר שומר שינויים במכשיר הנוכחי בלבד. יש להזין את מפתח ה-Firebase בקוד להפעלת סנכרון חי!</span>
                        </div>
                    )}

                    {}
                    <header class="bg-white border-b border-slate-200 px-6 py-4 flex flex-col md:flex-row items-center justify-between gap-4 shrink-0">
                        <div class="flex items-center gap-3">
                            <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center text-white shadow-md">
                                <i data-lucide="layers" class="w-5 h-5"></i>
                            </div>
                            <div>
                                <h1 class="text-xl font-bold text-slate-800">P2F - from preform to fiber</h1>
                                <p class="text-xs text-slate-500">תכנון, מעקב ועדכון התהליכים באולם בזמן אמת</p>
                            </div>
                        </div>

                        {/* Navigation Tabs and Global Metrics */}
                        <div class="flex flex-wrap items-center gap-4">
                            <div class="flex bg-slate-100 p-1 rounded-lg">
                                <button 
                                    onClick={() => setActiveTab("board")}
                                    class={`px-3 py-1.5 rounded-md text-xs font-semibold transition ${activeTab === "board" ? "bg-white text-slate-800 shadow-sm" : "text-slate-600 hover:text-slate-800"}`}
                                >
                                    לוח מעקב ראשי
                                </button>
                                <button 
                                    onClick={() => setActiveTab("history")}
                                    class={`px-3 py-1.5 rounded-md text-xs font-semibold transition ${activeTab === "history" ? "bg-white text-slate-800 shadow-sm" : "text-slate-600 hover:text-slate-800"}`}
                                >
                                    ארכיון והיסטוריה
                                </button>
                            </div>

                            <div class="flex items-center gap-4">
                                <div class="flex items-center gap-2 bg-slate-100 px-3 py-1.5 rounded-lg text-xs text-slate-600">
                                    <span class={`w-2 h-2 rounded-full ${isLive ? 'bg-green-500 animate-pulse' : 'bg-amber-500'}`}></span>
                                    <span class="font-medium">{isLive ? 'מחובר לפיירבייס' : 'מצב הדגמה'}</span>
                                </div>
                                <div class="bg-blue-50 text-blue-700 px-3 py-1.5 rounded-lg text-xs font-semibold">
                                    סה"כ במעקב: {monitoredFibersCount} סיבים
                                </div>
                            </div>
                        </div>
                    </header>

                    {/* Creation Form Bar */}
                    {activeTab !== "history" && (
                        <div class="bg-slate-50 border-b border-slate-200 px-6 py-3 shrink-0">
                            <form onSubmit={handleAddFiber} class="flex flex-wrap items-center gap-4">
                                <span class="text-sm font-bold text-slate-700 flex items-center gap-1.5">
                                    <i data-lucide="plus-circle" class="w-4 h-4 text-blue-600"></i>
                                    הוספת פעילות חדשה:
                                </span>
                                <input 
                                    type="text" 
                                    placeholder="למשל: P0528 NPM"
                                    value={newFiberName}
                                    onChange={(e) => setNewFiberName(e.target.value)}
                                    class="flex-1 min-w-[200px] max-w-sm px-3 py-1.5 text-sm bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                />
                                <select 
                                    value={newFiberStation}
                                    onChange={(e) => setNewFiberStation(e.target.value)}
                                    class="px-3 py-1.5 text-sm bg-white border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
                                >
                                    {STATIONS.map(st => (
                                        <option key={st.id} value={st.id}>{st.name}</option>
                                    ))}
                                </select>
                                <label class="flex items-center gap-2 cursor-pointer select-none">
                                    <input 
                                        type="checkbox"
                                        checked={newFiberSaveToHistory}
                                        onChange={() => setNewFiberSaveToHistory(!newFiberSaveToHistory)}
                                        class="w-4 h-4 text-blue-600 border-slate-300 rounded focus:ring-blue-500"
                                    />
                                    <span class="text-xs font-medium text-slate-600">שמור בהיסטוריית ארכיון</span>
                                </label>
                                <button 
                                    type="submit"
                                    class="bg-blue-600 hover:bg-blue-700 text-white font-semibold text-sm px-4 py-1.5 rounded-lg transition shadow-sm hover:shadow"
                                >
                                    הוסף ללוח
                                </button>
                            </form>
                        </div>
                    )}

                    {/* Mobile Switcher for Board layout */}
                    {activeTab === "board" && (
                        <div class="md:hidden flex bg-white border-b border-slate-200 shrink-0">
                            <button 
                                onClick={() => setActiveTab("board")}
                                class="flex-1 py-3 text-center text-sm font-semibold border-b-2 border-blue-600 text-blue-600 bg-blue-50/50"
                            >
                                ממשק מחשב
                            </button>
                            <button 
                                onClick={() => setActiveTab("list")}
                                class="flex-1 py-3 text-center text-sm font-semibold border-b-2 border-transparent text-slate-600"
                            >
                                ממשק לנייד
                            </button>
                        </div>
                    )}

                    {/* MAIN GRAPHICAL BOARD VIEW */}
                    <main class="flex-1 overflow-y-auto relative bg-slate-50">
                        {activeTab === "board" && (
                            <div class="h-full overflow-y-auto p-6 grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 items-start">

                                            {/* Add Signed entry box */}
                                            {!selectedFiber.archived && (
                                                <div class="bg-slate-50 border border-slate-200 p-3 rounded-xl space-y-3 shrink-0">
                                                    <div class="flex gap-2">
                                                        <input 
                                                            type="text"
                                                            placeholder="שם מפעיל..."
                                                            value={tempOperatorName}
                                                            onChange={(e) => setTempOperatorName(e.target.value)}
                                                            class="w-1/3 px-2 py-1.5 text-xs bg-white border border-slate-300 rounded-lg focus:ring-1 focus:ring-blue-500 focus:outline-none font-bold"
                                                        />
                                                        <span class="text-xs text-slate-400 self-center font-semibold">
                                                            חותמת זמן: {new Date().toLocaleDateString('he-IL')} (היום)
                                                        </span>
                                                    </div>
                                                    <textarea 
                                                        placeholder="הקלד נתונים, הערה או תוצאות מדידה חתומות לתחנה זו..."
                                                        value={tempModalNoteText}
                                                        onChange={(e) => setTempModalNoteText(e.target.value)}
                                                        class="w-full border border-slate-200 rounded-lg p-2 text-xs focus:ring-1 focus:ring-blue-500 focus:outline-none resize-none h-16"
                                                    />
                                                    <div class="flex justify-end">
                                                        <button 
                                                            type="button"
                                                            onClick={() => handleAddStationNoteEntry(selectedFiber.id, modalActiveStation)}
                                                            class="bg-blue-600 hover:bg-blue-700 text-white text-xs font-bold px-3 py-1.5 rounded-lg shadow-sm hover:shadow transition"
                                                        >
                                                            הוסף
                                                        </button>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        {/* Journey Audit Log Timeline Footer */}
                                        <div class="h-1/4 border-t border-slate-100 pt-4 flex flex-col overflow-hidden shrink-0">
                                            <h5 class="text-xs font-bold text-slate-500 mb-2 flex items-center gap-1.5">
                                                <i data-lucide="history" class="w-3.5 h-3.5"></i>
                                                יומן מסע של הגלם (לוג תנועות אוטומטי):
                                            </h5>
                                            <div class="flex-1 overflow-y-auto space-y-2 pr-1 custom-scrollbar text-xs">
                                                {selectedFiber.historyLog && selectedFiber.historyLog.map((log, idx) => (
                                                    <div key={idx} class="flex items-start gap-3 bg-slate-50 p-2 rounded-lg border border-slate-100">
                                                        <span class="text-slate-400 font-mono text-[10px] shrink-0 pt-0.5">
                                                            {new Date(log.timestamp).toLocaleString('he-IL')}
                                                        </span>
                                                        <div class="font-medium text-slate-700">
                                                            {log.note || 'הועבר תחנה'}
                                                        </div>
                                                    </div>
                                                ))}
                                                {(!selectedFiber.historyLog || selectedFiber.historyLog.length === 0) && (
                                                    <div class="text-slate-400 text-xs italic">לא תועדו תנועות עבור גלם זה</div>
                                                )}
                                            </div>
                                        </div>

                                    </div>

                                </div>

                                {/* Modal Actions Footer */}
                                <div class="bg-slate-50 border-t border-slate-200 px-6 py-4 flex justify-between items-center shrink-0">
                                    <button 
                                        onClick={() => handleDeleteOrArchiveFiber(selectedFiber.id)}
                                        class="bg-red-50 hover:bg-red-100 text-red-600 font-bold text-xs px-4 py-2 rounded-lg transition"
                                    >
                                        {selectedFiber.archived ? 'מחק לצמיתות מהארכיון' : (selectedFiber.saveToHistory !== false ? 'ארכב והעבר להיסטוריה' : 'מחק גלם לחלוטין')}
                                    </button>
                                    <button 
                                        onClick={() => setSelectedFiberId(null)}
                                        class="bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs px-5 py-2 rounded-lg transition"
                                    >
                                        סגור דוח גלם
                                    </button>
                                </div>

                            </div>
                        </div>
                    )}

                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
